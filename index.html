<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ ghép song ngữ Báo/Wikipedia</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box;}
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        
        .paragraph-box { border: 1px solid #ddd; border-radius: 6px; margin-top: 20px; padding: 15px; background-color: #fff; }
        .para-number { font-size: 1.2em; font-weight: bold; color: #8e44ad; margin-bottom: 15px; border-bottom: 2px solid #8e44ad; display: inline-block; padding-bottom: 5px; }
        
        .flex-container { display: flex; gap: 20px; }
        .col-goc, .col-dich { flex: 1; min-width: 0; }
        .col-goc { border-right: 1px dashed #ccc; padding-right: 20px; }
        
        .section-label { font-size: 0.85em; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: bold;}
        
        .sentence-item { margin: 8px 0; line-height: 1.8; }
        .sentence-num {
            display: inline-block; background-color: #ffeb3b; color: #d35400; font-size: 0.8em; font-weight: bold;
            padding: 2px 6px; border-radius: 4px; margin-right: 6px; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); vertical-align: text-bottom;
        }
        
        #status { text-align: center; font-size: 1.1em; margin-top: 15px; font-weight: bold; }
        .loading { color: #e67e22; } .error { color: red; } .success { color: green; }
        
        @media (max-width: 768px) {
            .flex-container { flex-direction: column; }
            .col-goc { border-right: none; padding-right: 0; border-bottom: 1px dashed #ccc; padding-bottom: 20px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Công cụ ghép Đoạn văn (Wikipedia/Blog/Báo)</h1>
    <p style="text-align: center; color: #d35400; font-size: 0.9em;">
        <i>Hệ thống tự động vượt tường lửa. Không cần dùng tiện ích Allow CORS!</i>
    </p>
    
    <div class="input-group">
        <label>🔗 Dán Link Bản Gốc (VD: English Wikipedia):</label>
        <input type="text" id="linkGoc" placeholder="https://en.wikipedia.org/wiki/Vietnam">
    </div>
    <div class="input-group">
        <label>🔗 Dán Link Bản Dịch (VD: Tiếng Việt Wikipedia):</label>
        <input type="text" id="linkDich" placeholder="https://vi.wikipedia.org/wiki/Việt_Nam">
    </div>
    
    <button onclick="batDauGhep()">Bắt đầu quét & ghép nối</button>

    <div id="status"></div>
    <div id="content"></div>
</div>

<script>
    // Trình lấy dữ liệu BẤT TỬ (Tự động chuyển đổi 3 cách thức khác nhau nếu bị chặn)
    async function fetchHtml(url) {
        let htmlText = "";
        
        // CÁCH 1: Dùng AllOrigins (Thường qua mặt được Wikipedia rất tốt)
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            if (res.ok) {
                const data = await res.json();
                if (data.contents) htmlText = data.contents;
            }
        } catch (e) { console.log("Cách 1 lỗi, đang thử Cách 2..."); }

        // CÁCH 2: Dùng Codetabs Proxy
        if (!htmlText || htmlText.length < 500) {
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                if (res.ok) htmlText = await res.text();
            } catch (e) { console.log("Cách 2 lỗi, đang thử Cách 3..."); }
        }

        // CÁCH 3: Gọi trực tiếp (Phòng khi người dùng đang bật tiện ích Allow CORS)
        if (!htmlText || htmlText.length < 500) {
            try {
                const res = await fetch(url);
                if (res.ok) htmlText = await res.text();
            } catch (e) { console.log("Cách 3 lỗi."); }
        }

        // Kiểm tra xem có lấy được gì không
        if (!htmlText || htmlText.length < 500) {
            throw new Error(`Trang web này bảo mật quá cao hoặc link bị sai. Không thể trích xuất dữ liệu!`);
        }

        const parser = new DOMParser();
        return parser.parseFromString(htmlText, "text/html");
    }

    // Hàm cắt câu và đánh số
    function danhSoThuTuCau(text) {
        if (!text) return '<i style="color:#aaa;">(Không có đoạn tương ứng ở bên này)</i>';
        
        // Dọn sạch các [1], [a], [cần dẫn nguồn]... trên Wikipedia
        text = text.replace(/\[.*?\]/g, ''); 
        
        let sentences = text.match(/.*?[.?!]+(?:["'”]*)(?:\s+|$)|.+/g);
        let resultHtml = '';
        let count = 1;
        
        if (sentences) {
            sentences.forEach(s => {
                let sTrim = s.trim();
                if (sTrim && sTrim.length > 2) { 
                    resultHtml += `<div class="sentence-item"><span class="sentence-num">${count}</span>${sTrim}</div>`;
                    count++;
                }
            });
        }
        return resultHtml;
    }

    // Hàm thông minh để tìm nội dung chính
    function layCacDoanVan(doc) {
        // Ưu tiên tìm vùng chứa nội dung chính để tránh lấy nhầm Menu, Header, Footer
        let container = doc.querySelector('.mw-parser-output') // Chuẩn của Wikipedia
                     || doc.querySelector('article') // Chuẩn của báo điện tử / Blog
                     || doc.querySelector('.content') 
                     || doc.querySelector('main')
                     || doc.body; // Cực chẳng đã mới lấy toàn thân trang web
        
        let pTags = container.querySelectorAll('p');
        let paragraphs = [];
        
        pTags.forEach(p => {
            let text = p.textContent.trim();
            // Lọc cực gắt: Phải dài hơn 40 ký tự mới được tính là 1 đoạn văn (Loại bỏ các dòng trống, chú thích ảnh)
            if (text.length > 40) {
                paragraphs.push(text);
            }
        });
        return paragraphs;
    }

    async function batDauGhep() {
        const urlGoc = document.getElementById('linkGoc').value.trim();
        const urlDich = document.getElementById('linkDich').value.trim();
        const statusDiv = document.getElementById('status');
        const contentDiv = document.getElementById('content');

        if (!urlGoc || !urlDich) {
            statusDiv.innerHTML = '<span class="error">Vui lòng dán đủ 2 link vào ô trống!</span>';
            return;
        }

        statusDiv.innerHTML = '<span class="loading">Đang phân tích, vượt tường lửa và gom chữ... ⏳</span>';
        contentDiv.innerHTML = ''; 

        try {
            const [docGoc, docDich] = await Promise.all([fetchHtml(urlGoc), fetchHtml(urlDich)]);

            const titleGoc = docGoc.querySelector('h1') ? docGoc.querySelector('h1').textContent.trim() : 'Bản Gốc';
            const titleDich = docDich.querySelector('h1') ? docDich.querySelector('h1').textContent.trim() : 'Bản Dịch';

            const doanGoc = layCacDoanVan(docGoc);
            const doanDich = layCacDoanVan(docDich);

            if (doanGoc.length === 0 && doanDich.length === 0) {
                statusDiv.innerHTML = '<span class="error">Đã vào được trang web, nhưng không tìm thấy đoạn văn nào! Có thể trang này dùng cấu trúc HTML đặc biệt.</span>';
                return;
            }

            const maxParas = Math.max(doanGoc.length, doanDich.length);
            statusDiv.innerHTML = `<span class="success">✅ TUYỆT VỜI! Đã ghép nối ${doanGoc.length} đoạn gốc và ${doanDich.length} đoạn bản dịch.</span>`;

            // Khung Tiêu Đề
            const titleBox = document.createElement('div');
            titleBox.className = 'paragraph-box';
            titleBox.innerHTML = `
                <div class="para-number">Tiêu đề bài viết</div>
                <div class="flex-container">
                    <div class="col-goc">
                        <span class="section-label">🌐 BẢN GỐC</span>
                        <h2 style="color:#c0392b; margin:0;">${titleGoc}</h2>
                    </div>
                    <div class="col-dich">
                        <span class="section-label">🇻🇳 BẢN DỊCH</span>
                        <h2 style="color:#c0392b; margin:0;">${titleDich}</h2>
                    </div>
                </div>
            `;
            contentDiv.appendChild(titleBox);

            // Khung từng đoạn văn
            for (let i = 0; i < maxParas; i++) {
                let textGoc = doanGoc[i] || ''; 
                let textDich = doanDich[i] || '';

                const paraBox = document.createElement('div');
                paraBox.className = 'paragraph-box';
                paraBox.innerHTML = `
                    <div class="para-number">Đoạn văn ${i + 1}</div>
                    <div class="flex-container">
                        <div class="col-goc">
                            ${danhSoThuTuCau(textGoc)}
                        </div>
                        <div class="col-dich">
                            ${danhSoThuTuCau(textDich)}
                        </div>
                    </div>
                `;
                contentDiv.appendChild(paraBox);
            }
        } catch (error) {
            statusDiv.innerHTML = `<span class="error">❌ Lỗi: ${error.message}</span>`;
        }
    }
</script>

</body>
</html>
