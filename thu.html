<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ ghép song ngữ WikiHow</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .step-box { border: 1px solid #ddd; border-radius: 6px; margin-top: 20px; padding: 15px; background-color: #fafafa; }
        .step-number { font-size: 1.2em; font-weight: bold; color: #0073e6; margin-bottom: 10px; border-bottom: 2px solid #0073e6; display: inline-block; }
        .text-de { font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .text-vn { color: #555; padding-left: 15px; border-left: 3px solid #4CAF50; }
        #status { text-align: center; font-size: 1.1em; margin-top: 15px; font-weight: bold; }
        .loading { color: #e67e22; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="container">
    <h1>Công cụ ghép song ngữ WikiHow</h1>
    
    <div class="input-group">
        <label>🔗 Dán Link Bản Gốc (VD: Tiếng Đức, Anh):</label>
        <input type="text" id="linkGoc" placeholder="Dán link WikiHow bản gốc vào đây...">
    </div>
    <div class="input-group">
        <label>🔗 Dán Link Bản Dịch (VD: Tiếng Việt):</label>
        <input type="text" id="linkDich" placeholder="Dán link WikiHow bản dịch vào đây...">
    </div>
    
    <button onclick="batDauGhep()">Bắt đầu ghép nối</button>

    <div id="status"></div>
    <div id="content"></div>
</div>

<script>
    async function fetchHtml(url) {
        // Dùng proxy allorigins để vượt qua lỗi bảo mật CORS của trình duyệt
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        const parser = new DOMParser();
        return parser.parseFromString(data.contents, "text/html");
    }

    async function batDauGhep() {
        const urlGoc = document.getElementById('linkGoc').value.trim();
        const urlDich = document.getElementById('linkDich').value.trim();
        const statusDiv = document.getElementById('status');
        const contentDiv = document.getElementById('content');

        // Kiểm tra xem người dùng đã nhập link chưa
        if (!urlGoc || !urlDich) {
            statusDiv.innerHTML = '<span class="error">Vui lòng dán đầy đủ cả 2 link trước khi chạy!</span>';
            return;
        }

        statusDiv.innerHTML = '<span class="loading">Đang tải và phân tích dữ liệu... Vui lòng đợi vài giây! ⏳</span>';
        contentDiv.innerHTML = ''; // Xóa kết quả cũ nếu có

        try {
            // Tải 2 trang cùng lúc
            const [docGoc, docDich] = await Promise.all([fetchHtml(urlGoc), fetchHtml(urlDich)]);

            // Quét các class chứa nội dung bước của WikiHow
            const stepsGoc = docGoc.querySelectorAll('.step');
            const stepsDich = docDich.querySelectorAll('.step');

            if (stepsGoc.length === 0 || stepsDich.length === 0) {
                statusDiv.innerHTML = '<span class="error">Không tìm thấy nội dung định dạng bước (step) trên trang này. Vui lòng đảm bảo đây là link WikiHow hợp lệ!</span>';
                return;
            }

            statusDiv.innerHTML = `<span class="success">Đã ghép thành công! Tìm thấy ${stepsGoc.length} bước gốc và ${stepsDich.length} bước dịch. ✅</span>`;

            const maxSteps = Math.min(stepsGoc.length, stepsDich.length);
            for (let i = 0; i < maxSteps; i++) {
                let textGoc = stepsGoc[i].innerText.trim();
                let textDich = stepsDich[i].innerText.trim();

                const stepBox = document.createElement('div');
                stepBox.className = 'step-box';
                stepBox.innerHTML = `
                    <div class="step-number">Bước ${i + 1}</div>
                    <div class="text-de">🌐 BẢN GỐC:<br>${textGoc}</div>
                    <div class="text-vn">🇻🇳 BẢN DỊCH:<br>${textDich}</div>
                `;
                contentDiv.appendChild(stepBox);
            }
        } catch (error) {
            statusDiv.innerHTML = `<span class="error">Có lỗi xảy ra: ${error.message}</span>`;
        }
    }
</script>

</body>
</html>
